name: bridge board init (one-time)

# Creates the portfolio's Projects v2 board with the PROJECTS_TOKEN secret
# (classic PAT, project scope). Run once; then set BRIDGE_PROJECT_NUMBER on
# every bridged repo and the scaffolds keep it in sync.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - uses: c4g-john/docassert-action/install@v1
      - name: Create the portfolio board
        env:
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: |
          docassert bridge create-board --title "PMO as Code" --repo "$GITHUB_REPOSITORY"
