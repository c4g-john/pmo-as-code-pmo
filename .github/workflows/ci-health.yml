name: ci health sentinel

# Sweeps the latest completed run of every workflow across the ecosystem and
# maintains exactly one "CI health" issue here: opened/updated while anything
# is red, closed when the fleet is green. Answers "why did a human have to
# notice?" — they shouldn't.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ci-health
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Sweep latest run per workflow across all repos
        env:
          GH_TOKEN: ${{ github.token }}
          REPOS: >-
            pmo-as-code-pmo refuge-for-humans-pmo refuge-for-humans-app
            pmo-as-code-pipeline pmo-as-code-template pmo-as-code
            docassert pmo-as-code-spec docassert-action homebrew-tap
        run: |
          failures=""
          for r in $REPOS; do
            # Latest completed run per *active workflow*, queried per workflow:
            # a shared recent-runs window lets rarely-run workflows (releases,
            # weekly scans) age out of sight, and an unwatched workflow is a
            # blind spot, not a green.
            ids=$(gh api "repos/c4g-john/$r/actions/workflows?per_page=100" \
              -q '.workflows[] | select(.state == "active") | .id' 2>/dev/null || true)
            for id in $ids; do
              row=$(gh api "repos/c4g-john/$r/actions/workflows/$id/runs?per_page=1&status=completed" \
                -q '.workflow_runs[0] | select(. != null)
                    | select(.conclusion != "success" and .conclusion != "skipped"
                             and .conclusion != "cancelled")
                    | "- **" + .repository.name + "** / " + .name + ": " + .conclusion
                      + " ([run](" + .html_url + "))"' 2>/dev/null || true)
              [ -n "$row" ] && failures="$failures$row"$'\n'
            done
          done
          latest=$(curl -s https://pypi.org/pypi/docassert/json | python3 -c 'import json,sys; print(json.load(sys.stdin)["info"]["version"])' 2>/dev/null || echo "")
          if [ -n "$latest" ]; then
            for r in pmo-as-code-pmo refuge-for-humans-pmo pmo-as-code-pipeline pmo-as-code-spec; do
              pin=$(gh api "repos/c4g-john/$r/contents/.docassert-version" -H "Accept: application/vnd.github.raw" 2>/dev/null | head -n1 | tr -d '[:space:]')
              if [ -z "$pin" ]; then
                failures="$failures- **$r**: .docassert-version missing or unreadable — pin monitoring is blind (vacuity class)"$'\n'
              elif [ "$pin" != "$latest" ]; then
                failures="$failures- **$r**: pin $pin trails latest $latest (stale-pin / drift-guard-vacuity class)"$'\n'
              fi
            done
            formula=$(gh api "repos/c4g-john/homebrew-tap/contents/Formula/docassert.rb" -H "Accept: application/vnd.github.raw" 2>/dev/null | grep -oE 'docassert-[0-9.]+\.tar\.gz' | head -n1 | sed 's/docassert-//;s/\.tar\.gz//')
            if [ -z "$formula" ]; then
              failures="$failures- **homebrew-tap**: formula version unreadable — freshness monitoring is blind (vacuity class)"$'\n'
            elif [ "$formula" != "$latest" ]; then
              failures="$failures- **homebrew-tap**: formula $formula trails latest $latest (stale-formula class)"$'\n'
            fi
          fi
          title="CI health: failures detected"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "in:title \"$title\"" --json number -q '.[0].number')
          if [ -n "$failures" ]; then
            body=$(printf 'The latest completed run of these workflows is not green:\n\n%s\n_Maintained by the ci-health sentinel (every 30 minutes). This issue closes itself when the fleet is green. Transient Pages flakes self-retry once before appearing here._' "$failures")
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
              echo "updated #$existing"
            else
              gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
            fi
            echo "$failures"
            exit 0
          fi
          if [ -n "$existing" ]; then
            gh issue close "$existing" --repo "$GITHUB_REPOSITORY" \
              --comment "Fleet is green; closing."
            echo "closed #$existing"
          else
            echo "fleet green"
          fi
