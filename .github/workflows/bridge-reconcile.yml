name: bridge reconcile (GOV + OPS)

# Polices this repository's issues against the union of the projects mapped
# here. A red run is the alarm.
on:
  issues:
    types: [opened, reopened, edited, closed]
  schedule:
    - cron: "47 9 * * *"
  workflow_dispatch:

concurrency:
  group: bridge-reconcile
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - uses: c4g-john/docassert-action/install@v1
      - name: Reconcile (union of GOV and OPS)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          docassert bridge reconcile --repo "$GITHUB_REPOSITORY"
