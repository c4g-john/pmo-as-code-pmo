name: bridge scaffold (GOV + OPS)

# Documents -> issues for the projects mapped to this repository (GOV and
# OPS share it; the bridge reconciles them as a union). Other projects
# scaffold from workflows in their own code repositories.
on:
  push:
    branches: [main]
    paths: ["documents/**"]
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

concurrency:
  group: bridge-scaffold
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: c4g-john/docassert-action/install@v1
      - name: Scaffold GOV and OPS into this repository
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_NUMBER: ${{ vars.BRIDGE_PROJECT_NUMBER }}
        run: |
          extra=""
          if [ -n "$PROJECT_NUMBER" ] && [ -n "$PROJECTS_TOKEN" ]; then
            extra="--project-owner c4g-john --project-number $PROJECT_NUMBER --init-board"
          fi
          for prj in PRJ-001-GOV PRJ-005-OPS; do
            # shellcheck disable=SC2086
            docassert bridge scaffold \
              --repo "$GITHUB_REPOSITORY" \
              --project "$prj" \
              --docs-url "https://github.com/$GITHUB_REPOSITORY/blob/main" \
              $extra
          done
